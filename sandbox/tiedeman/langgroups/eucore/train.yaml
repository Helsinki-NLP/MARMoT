# Denoising transform parameters
denoising_objective: bart
mask_ratio: 0.2              # Fraction of tokens to mask
mask_length: span-poisson    # Options: "subword", "word", "span-poisson"
poisson_lambda: 3.0          # Lambda for span length distribution
replace_length: 1            # -1: keep N tokens, 0: remove all, 1: single mask per span

# Model Architecture Options
enc_layers: [3,3,3]
dec_layers: [3,3,3]

model_dim: 768      
dropout: 0.1      
model_dtype: bf16     
add_language_tokens: false

# x-transformers specific options
x_transformers_opts:
  attn_flash: true     
  rotary_pos_emb: true     
  tie_embedding: false    
  heads: 12
  pre_norm: false
  post_emb_norm: true
  post_emb_norm_bias: true
  attn_dropout: 0.1
  ff_dropout: 0.1
  layernorm_bias: true
  use_abs_pos_emb: false

src_seq_length_min: 1
tgt_seq_length_min: 1
src_seq_length_max: 512
tgt_seq_length_max: 512
max_length: 512

# Training Configuration
train_steps: 250000
accum_count: [20]
lookahead_minibatches: 16      
batch_size: 8196    
batch_type: tokens  
normalization: tokens  
queue_size: 40

# Decoding parameters during validation
valid_batch_size: 128     
beam_size: 1

# Optimizer settings (from create_opts)
optim: adamw

learning_rate: 0.0008
adam_beta1: 0.9
adam_beta2: 0.9
weight_decay: 0.01
max_grad_norm: 1.0
label_smoothing: 0.1

# Learning rate scheduling
warmup_steps: 10000
decay_method: linear_warmup
learning_rate_decay: 0.5     
start_decay_steps: 10000   
average_decay: 0

world_size: 72
gpu_ranks: [0,1,2,3,4,5,6,7]
n_nodes: 9
task_distribution_strategy: weighted_sampling
node_rank: 0

seed: 42
valid_steps: 5000    
valid_metrics: [bleu]
save_checkpoint_steps: 5000    
keep_checkpoint: 5       

# Logging and Monitoring

log_model_structure: false
# tensorboard: true               # enable tensorboard logging
# tensorboard_log_dir: ./logs     # tensorboard log directory
report_every: 500     
report_training_accuracy: true

# Model saving
save_model: /pfs/lustrep1/scratch/project_462000964/members/tiedeman/MARMoT/sandbox/tiedeman/langgroups/eucore/model
save_strategy: best_and_last
