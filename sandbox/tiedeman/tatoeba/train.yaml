src_vocab:
   deu: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/deu/32000/tokenizer.json
   eng: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/eng/32000/tokenizer.json
   fin: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/fin/32000/tokenizer.json
   swe: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/swe/32000/tokenizer.json
tgt_vocab:
   deu: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/deu/32000/tokenizer.json
   eng: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/eng/32000/tokenizer.json
   fin: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/fin/32000/tokenizer.json
   swe: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/swe/32000/tokenizer.json

# Denoising transform parameters
denoising_objective: bart
mask_ratio: 0.2              # Fraction of tokens to mask
mask_length: span-poisson    # Options: "subword", "word", "span-poisson"
poisson_lambda: 3.0          # Lambda for span length distribution
replace_length: 1            # -1: keep N tokens, 0: remove all, 1: single mask per span

# Model Architecture Options
enc_layers: [9]                   # Encoder layers
dec_layers: [3]                   # Decoder layers

model_dim: 768                    # Transformer model dimension
dropout: 0.1                      # Dropout rate
model_dtype: bf16

# x-transformers specific options
x_transformers_opts:
  attn_flash: true          # Flash attention (not supported on V100)
  rotary_pos_emb: true      # Use rotary positional embeddings
  tie_embedding: false      # Tie input/output embeddings
  heads: 12
  pre_norm: false
  post_emb_norm: true
  post_emb_norm_bias: true
  attn_dropout: 0.1
  ff_dropout: 0.1
  layernorm_bias: true
  use_abs_pos_emb: true

src_seq_length_max: 256
tgt_seq_length_max: 256

# Training Configuration
train_steps: 500000
accum_count: [4       ]
lookahead_minibatches: 16      
batch_size: 8196    
batch_type: tokens  
valid_batch_size: 1024
normalization: tokens  
queue_size: 100

# Optimizer settings (from create_opts)
optim: adamw

learning_rate: 0.0005
adam_beta1: 0.9
adam_beta2: 0.9
weight_decay: 0.01
max_grad_norm: 1.0
label_smoothing: 0.1

# Learning rate scheduling
warmup_steps: 5000
decay_method: linear_warmup
learning_rate_decay: 0       
start_decay_steps: 0       

world_size: 8
gpu_ranks: [0,1,2,3,4,5,6,7]
task_distribution_strategy: weighted_sampling
node_rank: 0

seed: 42
valid_steps: 5000    
valid_metrics: [bleu    ]
save_checkpoint_steps: 5000    
keep_checkpoint: 5       

# Logging and Monitoring

log_model_structure: false        # log model structure
# tensorboard: true               # enable tensorboard logging
# tensorboard_log_dir: ./logs     # tensorboard log directory
report_every: 100     
report_training_accuracy: true

# Model saving
save_model: /scratch/project_462000964/members/tiedeman/MARMoT/sandbox/tiedeman/tatoeba/model/deu+eng+fin+swe
