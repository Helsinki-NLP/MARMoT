# Training configuration for 2-node setup with 8 GPUs total (4 GPUs per node)
# Node 0: GPUs 0,1,2,3 | Node 1: GPUs 4,5,6,7
# Shared encoder across all tasks, language-specific decoders distributed across nodes
# Disclaimer: Model training settings, parameters and values are only for testing purpose. 


# Task Configuration - 4 tasks distributed across 2 nodes (8 GPUs total)
tasks:
  task_en_ar:
    src_tgt: "en-ar"
    weight: 1.0
    introduce_at_training_step: 0
    node_gpu: 0:0  # Node 0, GPU 0
    enc_sharing_group: ["shared"]  # Shared encoder across all tasks
    dec_sharing_group: ["ar"]      # Arabic-specific decoder
    transforms: [denoising,filtertoolong]
    path_src: /scratch/project_462000964/shared/hplt_bilingual/ar-en.tmx/train_en.txt
    path_tgt: /scratch/project_462000964/shared/hplt_bilingual/ar-en.tmx/train_ar.txt
    path_valid_src: /scratch/project_462000964/shared/hplt_bilingual/ar-en.tmx/val_en.txt
    path_valid_tgt: /scratch/project_462000964/shared/hplt_bilingual/ar-en.tmx/val_ar.txt


  task_en_eu:
    src_tgt: "en-eu"
    weight: 1.0
    introduce_at_training_step: 0
    node_gpu: 0:1  # Node 0, GPU 1
    enc_sharing_group: ["shared"]  # Shared encoder across all tasks
    dec_sharing_group: ["eu"]      # Basque-specific decoder
    transforms: [denoising,filtertoolong]
    path_src: /scratch/project_462000964/shared/hplt_bilingual/eu-en.tmx/train_en.txt
    path_tgt: /scratch/project_462000964/shared/hplt_bilingual/eu-en.tmx/train_eu.txt
    path_valid_src: /scratch/project_462000964/shared/hplt_bilingual/eu-en.tmx/val_en.txt
    path_valid_tgt: /scratch/project_462000964/shared/hplt_bilingual/eu-en.tmx/val_eu.txt


  task_en_fi:
    src_tgt: "en-fi"
    weight: 1.0
    introduce_at_training_step: 0
    node_gpu: 0:2  # Node 0, GPU 2
    enc_sharing_group: ["shared"]  # Shared encoder across all tasks
    dec_sharing_group: ["fi"]      # Finnish-specific decoder
    transforms: [denoising,filtertoolong]
    path_src: /scratch/project_462000964/shared/hplt_bilingual/fi-en.tmx/train_en.txt
    path_tgt: /scratch/project_462000964/shared/hplt_bilingual/fi-en.tmx/train_fi.txt
    path_valid_src: /scratch/project_462000964/shared/hplt_bilingual/fi-en.tmx/val_en.txt
    path_valid_tgt: /scratch/project_462000964/shared/hplt_bilingual/fi-en.tmx/val_fi.txt


  task_en_he:
    src_tgt: "en-he"
    weight: 1.0
    introduce_at_training_step: 0
    node_gpu: 0:3  # Node 0, GPU 3
    enc_sharing_group: ["shared"]  # Shared encoder across all tasks
    dec_sharing_group: ["he"]      # Hebrew-specific decoder
    transforms: [denoising,filtertoolong]
    path_src: /scratch/project_462000964/shared/hplt_bilingual/he-en.tmx/train_en.txt
    path_tgt: /scratch/project_462000964/shared/hplt_bilingual/he-en.tmx/train_he.txt
    path_valid_src: /scratch/project_462000964/shared/hplt_bilingual/he-en.tmx/val_en.txt
    path_valid_tgt: /scratch/project_462000964/shared/hplt_bilingual/he-en.tmx/val_he.txt


  task_en_hi:
    src_tgt: "en-hi"
    weight: 1.0
    introduce_at_training_step: 0
    node_gpu: "1:0"  # Node 1, GPU 0 (global GPU 4)
    enc_sharing_group: ["shared"]  # Shared encoder across all tasks
    dec_sharing_group: ["hi"]      
    transforms: [denoising,filtertoolong]
    path_src: /scratch/project_462000964/shared/hplt_bilingual/hi-en.tmx/train_en.txt
    path_tgt: /scratch/project_462000964/shared/hplt_bilingual/hi-en.tmx/train_hi.txt
    path_valid_src: /scratch/project_462000964/shared/hplt_bilingual/hi-en.tmx/val_en.txt
    path_valid_tgt: /scratch/project_462000964/shared/hplt_bilingual/hi-en.tmx/val_hi.txt


  task_en_hr:
    src_tgt: "en-hr"
    weight: 1.0
    introduce_at_training_step: 0
    node_gpu: "1:1"  # Node 1, GPU 1 (global GPU 5)
    enc_sharing_group: ["shared"]  # Shared encoder across all tasks
    dec_sharing_group: ["hr"]      
    transforms: [denoising,filtertoolong]
    path_src: /scratch/project_462000964/shared/hplt_bilingual/hr-en.tmx/train_en.txt
    path_tgt: /scratch/project_462000964/shared/hplt_bilingual/hr-en.tmx/train_hr.txt
    path_valid_src: /scratch/project_462000964/shared/hplt_bilingual/hr-en.tmx/val_en.txt
