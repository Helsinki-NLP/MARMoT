# Inference configuration template
# Disclaimer: Model training settings, parameters and values are only for testing purpose. 

# Task Configuration
task_id: task_de-en # A standalone task_id is required for inferencing

tasks:
  task_de-en:
    src_tgt: "de-en"
    node_gpu: 0:0
    enc_sharing_group: ["shared"]
    dec_sharing_group: ["en"]

# ============================================================================
# Vocabulary Configuration - HuggingFace Tokenizer
# ============================================================================
use_hf_tokenizer: true

src_vocab:
  de: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/deu/32000/tokenizer.json
tgt_vocab:
  en: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/eng/32000/tokenizer.json

src_seq_length_max: 256
src_seq_length_min: 10
tgt_seq_length_max: 256
tgt_seq_length_min: 10
max_length: 256

# ============================================================================
# Model Architecture  (must match training)
# ============================================================================
enc_layers: [9]
dec_layers: [3]


model_dim: 768                    # Transformer model dimension
dropout: 0.1                      # Dropout rate
model_dtype: bf16

# ============================================================================
# x-transformers Options - ModernBERT Configuration (from training)
# ============================================================================

# x-transformers specific options
x_transformers_opts:
  attn_flash: true            # Flash attention (not supported on V100)
  rotary_pos_emb: true          # Use rotary positional embeddings
  tie_embedding: false           # Tie input/output embeddings
  heads: 12
  pre_norm: false
  post_emb_norm: true
  post_emb_norm_bias: true
  attn_dropout: 0.1
  ff_dropout: 0.1
  layernorm_bias: true
  use_abs_pos_emb: true

  

# ============================================================================
# Inference Configuration
# ============================================================================
# Model checkpoint to load
# model: /scratch/project_462000964/MARMoT/sandbox/tiedemann/SingleNode4Langs/best-model/de-en-fi-sv

# Input/output files
# src: /scratch/project_462000964/MARMoT/data/tatoeba/test/deu-eng.deu.gz
# output: /scratch/project_462000964/MARMoT/sandbox/tiedemann/SingleNode4Langs/deu-eng.deu.eng

# Decoding parameters
beam_size: 5
batch_size: 32
batch_type: sents

# GPU settings
gpu: 0
world_size: 1
gpu_ranks: [0]

# Report settings
report_time: true
# verbose: true # currently not supported in inference, need to modify code to enable it

# Random seed
seed: 42
