# Denoising transform parameters
denoising_objective: bart
mask_ratio: 0.2              # Fraction of tokens to mask
mask_length: span-poisson    # Options: 'subword', 'word', 'span-poisson'
poisson_lambda: 3.0          # Lambda for span length distribution
replace_length: 1            # -1: keep N tokens, 0: remove all, 1: single mask per span

src_seq_length_max: 256               
tgt_seq_length_max: 256  

# Model Architecture Options
enc_layers: [9]                   # Encoder layers
dec_layers: [3]                   # Decoder layers

model_dim: 768                    # Transformer model dimension
dropout: 0.1                      # Dropout rate
model_dtype: bf16



# x-transformers specific options
x_transformers_opts:
  attn_flash: true            # Flash attention (not supported on V100)
  rotary_pos_emb: true          # Use rotary positional embeddings
  tie_embedding: false           # Tie input/output embeddings
  heads: 12
  pre_norm: false
  post_emb_norm: true
  post_emb_norm_bias: true
  attn_dropout: 0.1
  ff_dropout: 0.1
  layernorm_bias: true
  use_abs_pos_emb: true


# Training Configuration

# Training specifics
train_steps: 500000
accum_count: [4]                 # gradient accumulation
lookahead_minibatches: 16        # look-ahead to sort by length
batch_size: 8196                 # per-GPU batch size
batch_type: tokens   
valid_batch_size: 1024
normalization: tokens            
queue_size: 100
# batch_size: 128
# batch_type: sents              # adjust based on GPU memory
# valid_batch_size: 32           # validation batch size
valid_steps: 5000                # validation frequency    
valid_metrics: [bleu]              
save_checkpoint_steps: 5000      # checkpoint saving frequency
keep_checkpoint: 5               # number of checkpoints to keep

# Optimizer settings (from create_opts)
optim: adamw
learning_rate: 0.0003
adam_beta1: 0.9
adam_beta2: 0.999
weight_decay: 0.0
max_grad_norm: 1.0

# Learning rate scheduling
warmup_steps: 5000
decay_method: linear_warmup
learning_rate_decay: 0
start_decay_steps: 0

# Distributed training (single GPU setup)
world_size: 8
gpu_ranks: [0,1,2,3,4,5,6,7]
task_distribution_strategy: weighted_sampling
node_rank: 0

# Data Configuration

# Vocabulary files
src_vocab:
  de: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/deu/32000/tokenizer.json
  en: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/eng/32000/tokenizer.json
  fi: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/fin/32000/tokenizer.json
  sv: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/swe/32000/tokenizer.json
tgt_vocab:
  de: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/deu/32000/tokenizer.json
  en: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/eng/32000/tokenizer.json
  fi: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/fin/32000/tokenizer.json
  sv: /scratch/project_462000964/MARMoT/tokenizer/tatoeba/swe/32000/tokenizer.json

use_hf_tokenizer: true


# Logging and Monitoring

log_model_structure: false         # log model structure
# tensorboard: true                 # enable tensorboard logging
# tensorboard_log_dir: ./logs     # tensorboard log directory
report_every: 100
report_training_accuracy: true     # reporting accuracy

# Miscellaneous
seed: 42                          # random seed
reset_optim: all                  # reset optimizer state
label_smoothing: 0.1              # Label smoothing for better generalization

#TODO: ask joseph about it 

# Model saving
save_model: /scratch/project_462000964/MARMoT/sandbox/tiedemann/SingleNode4Langs/model/de-en-fi-sv # model save path

