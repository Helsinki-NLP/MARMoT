# Model Architecture Options
enc_layers: [6]
dec_layers: [6]

model_dim: 768      
dropout: 0.1      
model_dtype: bf16     
add_language_tokens: false

# x-transformers specific options
x_transformers_opts:
  attn_flash: true     
  rotary_pos_emb: true     
  tie_embedding: false    
  heads: 8
  pre_norm: false
  post_emb_norm: true
  post_emb_norm_bias: true
  attn_dropout: 0.1
  ff_dropout: 0.1
  layernorm_bias: true
  use_abs_pos_emb: false

src_seq_length_min: 1
tgt_seq_length_min: 1
src_seq_length_max: 1024
tgt_seq_length_max: 1024
max_length: 1024

# Training Configuration
train_steps: 100000
accum_count: [20]
lookahead_minibatches: 20       
batch_size: 8192    
batch_type: tokens  
normalization: tokens  
queue_size: 120

# Optimizer settings (from create_opts)
optim: adamw

learning_rate: 0.0003
adam_beta1: 0.9
adam_beta2: 0.999
weight_decay: 0.01
max_grad_norm: 1.0
label_smoothing: 0.1

# Learning rate scheduling
warmup_steps: 10000
decay_method: linear_warmup
learning_rate_decay: 0.5     
start_decay_steps: 10000   
average_decay: 0

world_size: 280
gpu_ranks: [0,1,2,3,4,5,6,7]
n_nodes: 35
task_distribution_strategy: weighted_sampling

seed: 42
# Decoding parameters during validation
valid_batch_size: 16      
